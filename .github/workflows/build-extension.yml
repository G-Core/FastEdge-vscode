name: Build and Publish Extension

on:
  workflow_call:
    inputs:
      os_target:
        description: "target architecture" # linux-x64, darwin-arm64, win32-x64
        required: true
        type: string
      os_name:
        description: "operating system" # ubuntu-latest, macos-latest, windows-latest
        required: true
        type: string
      tag_version:
        description: "tag version" # vsCode tag version e.g. v0.1.5
        required: true
        type: string
    secrets:
      VAULT_TOKEN:
        required: true

permissions:
  contents: write # Required to create releases and push tags

jobs:
  build_extension:
    runs-on: [self-hosted, ubuntu-22-04, regular]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6

      - name: Setup Node Environment
        uses: ./.github/setup-node

      - name: Download debugger artifact for target platform
        uses: actions/download-artifact@v4
        with:
          name: fastedge-debugger-${{ inputs.os_target }}-artifact
          path: dist/debugger

      - name: Extract tag version
        id: extract_version
        run: |
          TAG_VERSION=${{ inputs.tag_version }}
          TAG_VERSION=${TAG_VERSION#v}  # Remove the 'v' prefix
          echo "TAG_VERSION: $TAG_VERSION"
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        run: |
          jq --arg version "$TAG_VERSION" '.version = $version' package.json > package.tmp.json
          mv package.tmp.json package.json

      - name: Verify debugger artifact
        run: |
          echo "Verifying downloaded debugger for ${{ inputs.os_target }}..."
          ls -lah dist/debugger/
          test -f dist/debugger/server.js || { echo "❌ Missing server.js"; exit 1; }
          test -d dist/debugger/frontend || { echo "❌ Missing frontend"; exit 1; }
          test -d dist/debugger/fastedge-cli || { echo "❌ Missing fastedge-cli"; exit 1; }

          echo "Checking CLI binary..."
          ls -lh dist/debugger/fastedge-cli/

          # Verify only the correct platform binary exists
          BINARY_COUNT=$(find dist/debugger/fastedge-cli -type f \( -name 'fastedge-run*' -o -name '*.exe' \) | wc -l)
          if [ "$BINARY_COUNT" -ne 1 ]; then
            echo "❌ Expected exactly 1 CLI binary, found $BINARY_COUNT"
            exit 1
          fi

          echo "✅ Debugger artifact verified for ${{ inputs.os_target }}"

      - name: Build JavaScript extension
        run: |
          pnpm run build

      - name: List extension files
        run: |
          pnpm exec vsce ls --no-dependencies

      - name: Package extension
        run: |
          pnpm exec vsce package --no-dependencies --target ${{ inputs.os_target }}
          FILENAME=$(ls *.vsix)
          echo "VSIX_FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Create SHA256 checksum
        run: |
          shasum -a 256 $VSIX_FILENAME > $VSIX_FILENAME.sha256
          echo "ASSET=$VSIX_FILENAME" >> $GITHUB_ENV
          echo "ASSET_SUM=$VSIX_FILENAME.sha256" >> $GITHUB_ENV

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_version }} # Explicitly provide the tag version
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SUM }}

      - name: Import Personal Access Token
        uses: hashicorp/vault-action@v3
        id: secrets
        with:
          url: https://puppet-vault.gc.onl
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/project_fastedge/vscode_marketplace publish_token | PUBLISH_TOKEN ;

      - name: Publish extension to VS Marketplace
        run: |
          pnpm exec vsce publish --no-dependencies --target ${{ inputs.os_target }} --pat ${{ steps.secrets.outputs.PUBLISH_TOKEN }}
